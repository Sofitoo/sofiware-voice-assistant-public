<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SofiWare</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-xl w-full max-w-md text-center space-y-6">

        <h1 class="text-3xl font-bold">🤖 SofiWare</h1>

        <input
            id="texto"
            type="text"
            placeholder="Escribí o hablá..."
            class="w-full p-3 rounded-lg text-black focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />

        <div class="flex gap-3">
            <!-- 🎤 Mic -->
            <button
                id="mic-btn"
                onclick="escucharMicrofono()"
                class="flex-1 bg-pink-600 hover:bg-pink-700 p-3 rounded-lg font-semibold transition"
            >
                🎤 Hablar
            </button>

            <!-- ✍️ Enviar -->
            <button
                onclick="enviar()"
                class="flex-1 bg-indigo-600 hover:bg-indigo-700 p-3 rounded-lg font-semibold transition"
            >
                ➤ Enviar
            </button>
        </div>

        <p id="respuesta" class="text-indigo-300 text-lg min-h-[2rem]"></p>

    </div>

    <script src="/static/script.js"></script>
</body>

</html>
